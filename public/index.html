<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>API Test UI - Auth & Requests</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px;color:#222}
    h1{font-size:1.2rem}
    label{display:block;margin-top:8px}
    input,select,textarea{width:100%;padding:8px;margin-top:4px;border:1px solid #ccc;border-radius:4px}
    .row{display:flex;gap:10px}
    .col{flex:1}
    button{margin-top:10px;padding:8px 12px}
    .token-box{background:#f5f5f5;padding:8px;border-radius:4px;word-break:break-all}
    .section{border:1px solid #eee;padding:12px;border-radius:6px;margin-bottom:12px}
    small{color:#666}
  </style>
</head>
<body>
  <h1>API Test UI — Login / Requests</h1>

  <div class="section">
    <strong>Configurações</strong>
    <label>Base URL
      <input id="baseUrl" placeholder="http://localhost:3000" value="https://api-jose-jhbt.onrender.com/" />
    </label>
  </div>

  <div class="section">
    <strong>Autenticação</strong>
    <div class="row">
      <div class="col">
        <label>Email
          <input id="email" placeholder="joao@example.com" />
        </label>
      </div>
      <div class="col">
        <label>Senha
          <input id="password" type="password" placeholder="123456" />
        </label>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <button id="btnLogin">Login</button>
      </div>
    </div>

    <div class="section" style="margin-top:12px;">
      <strong>Registro de usuário</strong>
      <label>Nome
        <input id="regNome" placeholder="João Silva" />
      </label>
      <label>Email
        <input id="regEmail" placeholder="teste@example.com" />
      </label>
      <label>Senha
        <input id="regPassword" type="password" placeholder="123456" />
      </label>
      <label>Perfil
        <select id="regPerfil">
          <option value="vendedor" selected>vendedor</option>
          <option value="gerente">gerente</option>
          <option value="admin">admin</option>
        </select>
      </label>
      <button id="btnRegister">Registrar</button>
    </div>

    <label>Token
      <input id="tokenInput" class="token-box" readonly placeholder="Nenhum token" />
    </label>
    <div class="row">
      <button id="btnCopy">Copiar token</button>
      <button id="btnClear">Limpar token</button>
    </div>
    <small>Dica: após o login ou registro, o token será salvo em <em>localStorage</em> e usado automaticamente nas requisições.</small>
    <div id="statusMessage" style="margin-top:8px;font-weight:bold"></div>
  </div>

  <div class="section">
    <strong>Construtor de Requisições</strong>
    <div class="row">
      <div style="width:140px">
        <label>Método
          <select id="method">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
        </label>
      </div>
      <div class="col">
        <label>Endpoint (path)
          <input id="endpoint" placeholder="/api/produtos" />
        </label>
      </div>
    </div>

    <label>Body (JSON)
      <textarea id="body" rows="6" placeholder='{"nome":"Produto X","preco_venda":100.0}'></textarea>
    </label>

    <div class="row">
      <button id="btnSend">Enviar</button>
      <button id="btnSendNoAuth">Enviar (sem token)</button>
    </div>

    <label>Resposta</label>
    <pre id="response" style="background:#fafafa;padding:8px;border:1px solid #eee;min-height:120px;white-space:pre-wrap"></pre>
  </div>

  <script src="/app.js"></script>
</body>
</html>
